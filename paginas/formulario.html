<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto WEB HTML/CSS</title>
</head>
<body>
    <div id="div-form">
        <h1>Formulário</h1>

        <form name="form" id="form" method="post">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" class="input-vlr01" maxlength="30" required placeholder="Informe o nome">

        <br>
        <br>

        <label for="cpf">CPF</label>
        <input type="number" name="cpf" id="cpf" class="input-vlr02" maxlength="14" required placeholder="Informe o CPF">

        <br>
        <br>

        <label for="datanascimento">Data de Nascimento</label>
        <input type="date" name="datanascimento" id="datanascimento" class="input-vlr03" required>

        <br>

        <br><label for="sexo">Sexo</label>
        <input type="radio" name="sexo" id="sexoM" class="input-op" value="M"> Masculino

        <input type="radio" name="sexo" id="sexoF" class="input-op" value="F"> Feminino

        <input type="radio" name="sexo" id="sexoN" class="input-op" value="N"> Não declarar<br>

        <br><label for="preferencias">Preferências</label>
        <input type="checkbox" name="estudo" id="estudo" class="input-op" value="estudo">Estudo

        <input type="checkbox" name="trabalho" id="trabalho" class="input-op" value="trabalho">Trabalho

        <input type="checkbox" name="viagem" id="viagem" class="input-op" value="viagem">Viagem

        <input type="checkbox" name="compras" id="compras" class="input-op" value="compras">Compras<br>

        <br>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" class="input-vlr02" maxlength="6" required placeholder="Informe a senha">

        <br>
        <br>

        <label for="estado">Estado</label>
        <select name="estado" id="estado" class="input-vlr02" required>
            <option>Selecione um Estado</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rodônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
        </select>
           <br>
            <br>
        <label for="comentario">Comentário</label>
        <textarea name="comentario" id="comentario" placeholder="Informe seu Comentário" required></textarea>

        <button type="submit" id="btn-enviar">Enviar</button>
        <button type="reset" id="btn-limpar">Limpar</button>
        <button id="btn">Botão</button>
        </form>

    </div>
    
</body>
</html>
